<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · Om Flower Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="brand-row">
      <span class="bloom">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="6" r="4.2"/><circle cx="17.3" cy="9.8" r="4.2"/>
          <circle cx="15.4" cy="16" r="4.2"/><circle cx="8.6" cy="16" r="4.2"/>
          <circle cx="6.7" cy="9.8" r="4.2"/><circle cx="12" cy="12" r="2.6" fill="#fffbf2"/>
        </svg>
      </span>
      <h1>Om Flower Store</h1>
    </div>
    <p class="tagline">Admin sign in</p>

    <div id="setupBanner" class="setup-banner hidden">
      ⚠️ Firebase abhi configure nahi hai. <code>js/firebase-config.js</code> kholo aur apne Firebase project ka config paste karo.
    </div>

    <form id="loginForm">
      <label class="field">Email
        <input type="email" id="email" autocomplete="username" required>
      </label>
      <label class="field">Password
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn-primary">Log in</button>
      <p id="loginError" class="form-error hidden"></p>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  if (!window.FIREBASE_CONFIGURED) {
    document.getElementById('setupBanner').classList.remove('hidden');
  }

  // If already logged in, skip straight to the admin panel.
  auth.onAuthStateChanged((user) => {
    if (user) window.location.href = 'admin.html';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    errorEl.classList.add('hidden');

    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'admin.html';
    } catch (err) {
      errorEl.textContent = friendlyAuthError(err.code);
      errorEl.classList.remove('hidden');
    }
  });

  function friendlyAuthError(code) {
    switch (code) {
      case 'auth/invalid-email': return 'Email sahi format mein nahi hai.';
      case 'auth/user-not-found': return 'Ye email registered admin user nahi hai.';
      case 'auth/wrong-password': return 'Password galat hai.';
      case 'auth/invalid-credential': return 'Email ya password galat hai.';
      case 'auth/too-many-requests': return 'Bahut attempts ho gaye, thodi der baad try karo.';
      default: return 'Login fail ho gaya. (' + code + ')';
    }
  }
</script>
</body>
</html>
