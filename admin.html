<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Om Flower Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="authCheck" class="auth-check">Checking session…</div>

<div id="app" class="app hidden">

  <header class="topbar">
    <div class="brand">
      <span class="bloom" style="color:#e8a33d">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="6" r="4.2"/><circle cx="17.3" cy="9.8" r="4.2"/>
          <circle cx="15.4" cy="16" r="4.2"/><circle cx="8.6" cy="16" r="4.2"/>
          <circle cx="6.7" cy="9.8" r="4.2"/><circle cx="12" cy="12" r="2.6" fill="#1f3a2e"/>
        </svg>
      </span>
      <span>Om Flower Store<small>Admin</small></span>
    </div>
    <div class="topbar-right">
      <span id="adminEmail"></span>
      <button id="logoutBtn" class="btn-ghost">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="products">Products</button>
    <button class="tab-btn" data-tab="categories">Categories</button>
    <button class="tab-btn" disabled title="Customer storefront banne ke baad available hoga">
      Orders <span class="soon">soon</span>
    </button>
  </nav>

  <main>
    <p id="setupBanner" class="setup-banner hidden" style="margin: 0 0 1rem;"></p>

    <section id="tab-products" class="tab-panel active">
      <div class="panel-toolbar">
        <input type="search" id="searchInput" placeholder="Search products…">
        <button id="addProductBtn" class="btn-primary">+ Add product</button>
      </div>
      <div id="emptyState" class="empty-state hidden">
        <p>Abhi koi product nahi hai</p>
        <p class="muted">Apna pehla bouquet, plant ya arrangement add karo</p>
      </div>
      <div id="productGrid" class="product-grid"></div>
    </section>

    <section id="tab-categories" class="tab-panel">
      <div class="panel-toolbar">
        <input type="text" id="newCategoryInput" placeholder="New category name (e.g. Roses)">
        <button id="addCategoryBtn" class="btn-primary">+ Add category</button>
      </div>
      <ul id="categoryList" class="category-list"></ul>
    </section>
  </main>
</div>

<!-- Add / Edit product drawer -->
<div id="drawerOverlay" class="drawer-overlay hidden"></div>
<aside id="productDrawer" class="drawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Add product</h2>
    <button type="button" id="closeDrawerBtn" class="btn-icon">✕</button>
  </div>
  <form id="productForm">
    <div class="drawer-body">
      <input type="hidden" id="productId">

      <label>Name
        <input type="text" id="fieldName" required>
      </label>

      <label>Price (₹)
        <input type="number" id="fieldPrice" min="0" step="1" required>
      </label>

      <label>Category
        <select id="fieldCategory" required></select>
      </label>

      <label>Description
        <textarea id="fieldDescription" rows="3" placeholder="Short description for this product"></textarea>
      </label>

      <fieldset>
        <legend>Occasion tags</legend>
        <div id="occasionChips" class="chip-group"></div>
      </fieldset>

      <label class="switch-row">
        <input type="checkbox" id="fieldInStock" checked> In stock
      </label>

      <label>Images
        <input type="file" id="fieldImages" accept="image/*" multiple>
      </label>
      <div id="imagePreview" class="image-preview"></div>

      <p id="formError" class="form-error hidden"></p>
    </div>
    <div class="drawer-footer">
      <button type="button" id="cancelDrawerBtn" class="btn-ghost">Cancel</button>
      <button type="submit" id="saveProductBtn" class="btn-primary">Save product</button>
    </div>
  </form>
</aside>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/github-proxy-config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
