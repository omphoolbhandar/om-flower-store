<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop · Om Flower Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/site.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="brand">
    <span class="bloom">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="6" r="4.2"/><circle cx="17.3" cy="9.8" r="4.2"/>
        <circle cx="15.4" cy="16" r="4.2"/><circle cx="8.6" cy="16" r="4.2"/>
        <circle cx="6.7" cy="9.8" r="4.2"/><circle cx="12" cy="12" r="2.6" fill="#fffbf2"/>
      </svg>
    </span>
    <span class="name">Om Flower Store</span>
  </a>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </nav>
  <a href="cart.html" class="cart-link" aria-label="Cart">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8a3 3 0 116 0"/>
    </svg>
    <span id="cartCount" class="cart-badge hidden">0</span>
  </a>
</header>

<section class="section">
  <div class="section-head">
    <h2 id="pageTitle">Shop</h2>
  </div>

  <div class="shop-toolbar">
    <input type="search" id="searchInput" placeholder="Search products…">
  </div>

  <div class="filter-row" id="categoryFilters"></div>
  <div class="filter-row" id="occasionFilters"></div>

  <div id="emptyState" class="empty-state hidden">
    <p>Koi product nahi mila</p>
    <p class="muted">Filter ya search badal ke try karo</p>
  </div>
  <div id="productGrid" class="product-grid"></div>
</section>

<footer class="site-footer">
  <div class="brand-row">
    <span class="bloom">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="6" r="4.2"/><circle cx="17.3" cy="9.8" r="4.2"/>
        <circle cx="15.4" cy="16" r="4.2"/><circle cx="8.6" cy="16" r="4.2"/>
        <circle cx="6.7" cy="9.8" r="4.2"/><circle cx="12" cy="12" r="2.6" fill="#1f3a2e"/>
      </svg>
    </span>
    <strong>Om Flower Store</strong>
  </div>
  <p>Fresh flowers &amp; bouquets, delivered with love.</p>
  <a id="footerWhatsapp" class="btn-primary" target="_blank" rel="noopener">Chat on WhatsApp</a>
  <p class="copyright">© 2026 Om Flower Store</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/site-config.js"></script>
<script src="js/cart.js"></script>
<script src="js/site-helpers.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
